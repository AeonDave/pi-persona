# Rosters: a team name → an ordered list of members.
# A member is a bare agent name, OR an inline `{ agent, role?, model?, skills? }` map that
# specialises ONE agent (so an ensemble of perspectives comes from a single agent + roles,
# not one .md per perspective). Referenced by a persona's `orchestration.roster` / `council.roster`.
# Project/user copies override.

# One `reviewer` agent, three complementary lenses — the role focuses each parallel pass
# (skills load the rest). Add `model: <provider/id>` to a member for cross-model diversity.
# Pin cheap models on WORKER members here; leave the SUPERVISOR on the session model (a weak
# supervisor is the least able to act on its delegation reflex).
review:
  - { agent: reviewer, role: "Focus ONLY on the SECURITY lens: injection, authz/access-control, secrets & token handling, unsafe sinks, input validation." }
  - { agent: reviewer, role: "Focus ONLY on the PERFORMANCE lens: algorithmic cost on hot paths, needless allocations/copies, repeated or N+1 I/O, unbounded work." }
  - { agent: reviewer, role: "Focus ONLY on the TESTS lens: untested branches and edge/error cases, brittle or mock-asserting tests, missing regression pins." }

repair: [operator, verifier]
magi: [melchior, balthasar, casper]

# compete: N implementers race the same task in isolated worktrees; a judge picks the winning diff.
# Two operator instances; give them different models for real diversity, e.g. model: <provider/id>.
build: [operator, operator]

# swarm (map strategy): a splitter enumerates the batch's items, a worker runs each in parallel.
swarm: [scout, operator]
